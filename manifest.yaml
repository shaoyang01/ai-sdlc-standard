name: ai-sdlc-standard
version: 0.1.0
status: draft
type: portable-standard-package
language: zh-CN
agent_bound: false
runtime_dependencies: []
entrypoints:
  overview: README.md
  roadmap: ROADMAP.md
  lifecycle: ai-sdlc/lifecycle.md
  gates: ai-sdlc/phase-gates.md
  artifact_flow: ai-sdlc/artifact-flow.md
  artifact_storage: ai-sdlc/artifact-storage.md
  change_control: ai-sdlc/change-control.md
  specification_schema: ess/specification-schema.md
  review_schema: ess/review-schema.md
  code_review_schema: ess/code-review-schema.md
  test_feedback_schema: ess/test-feedback-schema.md
  skill_contract_template: skill-contracts/skill-contract-template.md
  artifact_manifest_template: templates/artifact-manifest-template.md
  registry: registry/skill-registry.md
skills:
  docflow_writer:
    path: skills/docflow-writer/SKILL.md
    contract: skill-contracts/known-skills/docflow-writer.md
    references:
      - skills/docflow-writer/references/routing-rules.md
      - skills/docflow-writer/references/output-targets.md
      - skills/docflow-writer/references/execution-scenarios.md
      - skills/docflow-writer/references/lark-cli.md
      - skills/docflow-writer/references/legacy-html-style.md
  requirement_normalizer:
    path: skills/requirement-normalizer/SKILL.md
    contract: skill-contracts/known-skills/requirement-normalizer.md
    references:
      - skills/requirement-normalizer/references/intake-workflow.md
      - skills/requirement-normalizer/references/source-handling.md
      - skills/requirement-normalizer/references/conflict-and-blocking.md
      - skills/requirement-normalizer/references/output-artifact.md
  solution_reviewer:
    path: skills/solution-reviewer/SKILL.md
    contract: skill-contracts/known-skills/solution-reviewer.md
    references:
      - skills/solution-reviewer/references/review-workflow.md
      - skills/solution-reviewer/references/development-path-decision.md
      - skills/solution-reviewer/references/checklist.md
      - skills/solution-reviewer/references/output-report.md
  specification_writer:
    path: skills/specification-writer/SKILL.md
    contract: skill-contracts/known-skills/specification-writer.md
    references:
      - skills/specification-writer/references/writing-workflow.md
      - skills/specification-writer/references/schema-mapping.md
      - skills/specification-writer/references/blocking-rules.md
      - skills/specification-writer/references/output-artifact.md
portability:
  may_be_copied_to:
    - repository_root
    - shared_docs_repository
    - shared_drive
    - internal_knowledge_base
  must_not_require:
    - codex_config_directory
    - claude_config_directory
    - zcode_config_directory
    - local_absolute_user_path
consumers:
  - human_workflow
  - codex_skill
  - zcode_deepseek_prompt
  - code_review_prompt
  - document_renderer
