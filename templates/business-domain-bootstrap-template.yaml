# Business Domain Bootstrap Profile
#
# Store as:
#   .specify/business-domain-bootstrap.yaml
#
# Purpose:
#   Describe how a target repository should regenerate .specify/business_domain/**
#   after Speckit project bootstrap.
#
# Important:
#   business_domain content is not copied from another repository.
#   It is generated from the target repository's code and user-approved
#   business boundaries. Legacy Speckit docs are preserved for legacy workflows
#   and are not runtime bootstrap inputs.

schema_version: 0.1.0

generation_scope:
  project_bootstrap_includes_business_domain_content: false
  generation_script: "${AI_SDLC_STANDARD_HOME}/scripts/bootstrap-business-domain.sh"
  generate_after_project_bootstrap: true
  output_root: ".specify/business_domain"
  modes:
    pending:
      command: "${AI_SDLC_STANDARD_HOME}/scripts/bootstrap-business-domain.sh <target-project-path>"
      description: "Generate pending code-evidence skeletons only."
    confirmed:
      command: "${AI_SDLC_STANDARD_HOME}/scripts/bootstrap-business-domain.sh <target-project-path> --confirmed --domain-map .specify/business-domain-bootstrap.yaml"
      description: "Generate confirmed routable L1/L2/L4 skeletons from confirmed_domains."
  required_root_documents:
    - "00BusinessLandscape.md"
    - "00UbiquitousLanguage.md"
    - "01DomainCatalog.md"

inputs:
  code:
    source_roots:
      - "<source-root-or-module-glob>"
    include_patterns:
      - "<code-path-pattern>"
    exclude_patterns:
      - "<test-or-generated-path-pattern>"
  existing_docs:
    include:
      - "<optional-current-project-doc-path-confirmed-by-user>"
    exclude:
      - ".specify/memory/**"
      - ".specify/workflow/**"
      - ".specify/coding_guide/**"
    preserved_legacy_not_runtime_input:
      - ".specify/memory/**"
      - ".specify/workflow/**"
      - ".specify/coding_guide/**"
  user_supplied_context:
    required_when_business_domain_cannot_be_inferred: true
    examples:
      - "business domain names"
      - "main lifecycle or capability split"
      - "domain owners"

confirmed_domains: []
# Example:
# confirmed_domains:
#   - l1_id: "01"
#     l1_name_en: "SaleOrder"
#     l1_name_cn: "销售订单"
#     l2:
#       - l2_id: "01"
#         l2_name_en: "ReceiveAndFulfillment"
#         l2_name_cn: "收货与履约"
#         owner: "<domain-owner>"
#         l4:
#           - l4_id: "010101"
#             l4_name_en: "StraightOrderOutboundReceipt"
#             l4_name_cn: "直送出库回执"
#             owner: "<owner>"
#             evidence:
#               - "src/main/java/..."

domain_discovery:
  strategy: "<business-lifecycle|business-capability|bounded-context|user-provided>"
  must_not_use_package_names_only: true
  require_human_confirmation_before_creating_new_l1_l2: true
  root_document_expectations:
    business_landscape:
      includes:
        - "repository business purpose"
        - "fact-source layering"
        - "routing principle"
        - "main business domains"
        - "code anchors"
    ubiquitous_language:
      includes:
        - "domain terms"
        - "status vocabulary"
        - "entity names"
        - "cross-team wording rules"
    domain_catalog:
      includes:
        - "L1/L2 domain index"
        - "main document paths"
        - "planned L4 count or maturity"
        - "routing notes"

skeleton_rules:
  structure: "physical_l2_logical_l4"
  l1_l2_directory_naming: "{two_digit_number}{EnglishName}"
  l2_main_document_naming: "{L2Number}{EnglishName}({ChineseName}).md"
  l4_document_naming: "{L1Number}{L2Number}{L4Number}{EnglishName}({ChineseName}).md"
  l4_template_directory: "${AI_SDLC_STANDARD_HOME}/templates/business-domain-l4"
  l4_template_selection:
    source_priority:
      - "domain map project_type_profiles"
      - ".specify/project-governance-profile.yaml project.project_type_profiles"
      - "conservative backend-business-service fallback"
    precedence:
      - "admin-mixed-workflow"
      - "data-pipeline-etl"
      - "frontend-application"
      - "library-shared-component"
      - "backend-business-service"
    templates:
      backend-business-service: "templates/business-domain-l4/backend-business-service.md"
      admin-mixed-workflow: "templates/business-domain-l4/admin-mixed-workflow.md"
      frontend-application: "templates/business-domain-l4/frontend-application.md"
      data-pipeline-etl: "templates/business-domain-l4/data-pipeline-etl.md"
      library-shared-component: "templates/business-domain-l4/library-shared-component.md"
  entry_coverage_document_suffix: "EntryCoverage"
  create_l4_only_when:
    - "observed from code and confirmed by routing"
    - "approved by user or domain owner"
  confirmed_mode_requires:
    - "confirmed_domains is non-empty"
    - "each L1 has l1_id, l1_name_en, l1_name_cn, and l2"
    - "each L2 has l2_id, l2_name_en, l2_name_cn, owner, and l4"
    - "each L4 has l4_id, l4_name_en, l4_name_cn, and owner"
    - "confirmed L4 skeleton uses a project-type template selected from project_type_profiles"

outputs:
  required:
    - ".specify/business_domain/00BusinessLandscape.md"
    - ".specify/business_domain/00UbiquitousLanguage.md"
    - ".specify/business_domain/01DomainCatalog.md"
  optional:
    - "L1/L2 directories"
    - "L2 main documents"
    - "L4 skeleton documents"
    - "EntryCoverage documents"
  confirmed_mode:
    - ".specify/business_domain/{L1}/{L2}/{L2MainDocument}.md"
    - ".specify/business_domain/{L1}/{L2}/{L4Document}.md"
    - ".specify/business_domain/{L1}/{L2}/{EntryCoverageDocument}.md"

validation:
  must_check:
    - "root documents exist"
    - "domain catalog links point to existing documents"
    - "new L1/L2/L4 names follow naming rules"
    - "business domains are based on code evidence or user-approved boundaries"
    - "no business_domain content was copied from another repository"
  stop_when:
    - "domain split cannot be inferred"
    - "confirmed mode is requested without confirmed_domains"
    - "code evidence conflicts with user-provided business boundary"
    - "generation would require guessing business meaning"
